services:
  - type: web
    name: xgboost-copy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/render_start.py
    plan: standard
    healthCheckPath: /health
    disk:
      name: xgboost-copy-storage
      mountPath: /opt/render/project/src/runtime
      sizeGB: 5
    envVars:
      - key: REDIS_URL
        fromService:
          name: xgboost-copy-redis
          type: keyvalue
          property: connectionString
      - key: COINBASE_CREDENTIALS_PATH
        value: /etc/secrets/coinbase_api_key.json
      - key: MODEL_REGISTRY_ROOT
        value: /opt/render/project/src/runtime/models/multi_asset_v2
      - key: TRAINER_HISTORY_DB_PATH
        value: /opt/render/project/src/runtime/trainer_candle_history.sqlite3
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: COINBASE_WS_PRODUCTS_PER_CONNECTION
        value: "5"
      - key: COINBASE_CANDLE_RECONCILE_LOOKBACK_MINUTES
        value: "15"
      - key: TRAINER_HISTORY_SYNC_INTERVAL
        value: "300"
      - key: RENDER_HISTORY_BOOTSTRAP_ENABLED
        value: "true"
      - key: RENDER_HISTORY_BOOTSTRAP_TARGET_ROWS
        value: "2000"
      - key: RENDER_HISTORY_BOOTSTRAP_CHUNK_LIMIT
        value: "350"
      - key: RENDER_HISTORY_BOOTSTRAP_MAX_REQUESTS_PER_ASSET
        value: "20"
      - key: EXECUTION_ENABLED
        value: "true"
      - key: EXECUTION_DRY_RUN
        value: "true"
      - key: EXECUTION_COOLDOWN_SECONDS
        value: "90"
      - key: PAPER_TRADING_ENABLED
        value: "true"
      - key: PRODUCTS_CSV
        value: BTC-USD,ETH-USD,SOL-USD,XRP-USD,ADA-USD,DOGE-USD,AVAX-USD,DOT-USD,LINK-USD,LTC-USD,BCH-USD,UNI-USD,PEPE-USD,BONK-USD,FARTCOIN-USD,TAO-USD,SUI-USD,HBAR-USD,FET-USD,AAVE-USD,XLM-USD,ONDO-USD,AKT-USD,PENGU-USD
      - key: OBSERVED_BASES_CSV
        value: BTC,ETH,SOL,XRP,ADA,DOGE,AVAX,DOT,LINK,LTC,BCH,UNI,PEPE,BONK,FARTCOIN,TAO,SUI,HBAR,FET,AAVE,XLM,ONDO,AKT,PENGU
      - key: EXECUTION_ALLOWED_BASES_CSV
        value: BTC,ETH,SOL,XRP,ADA,DOGE,AVAX,DOT,LINK,LTC,BCH,UNI,PEPE,BONK,FARTCOIN,TAO,SUI,HBAR,FET,AAVE,XLM,ONDO,AKT,PENGU
      - key: PAPER_INITIAL_CASH
        value: "10000"
      - key: MAX_RISK_PER_TRADE
        value: "0.25"
      - key: MAX_SPREAD_PCT
        value: "0.01"
      - key: MAX_DAILY_DRAWDOWN
        value: "0.05"
      - key: PILOT_ORDER_NOTIONAL_USD
        value: "50"
      - key: CHOP_GUARD_ENABLED
        value: "true"
      - key: CHOP_GUARD_WINDOW_MINUTES
        value: "75"
      - key: CHOP_GUARD_FAST_EXIT_MINUTES
        value: "15"
      - key: CHOP_GUARD_ADVERSE_PNL_PCT
        value: "-0.15"
      - key: CHOP_GUARD_CAUTION_EXIT_COUNT
        value: "2"
      - key: CHOP_GUARD_LOCK_EXIT_COUNT
        value: "3"
      - key: CHOP_GUARD_LOCK_STOP_COUNT
        value: "2"
      - key: CHOP_GUARD_PROBABILITY_BUFFER
        value: "0.04"
      - key: CHOP_GUARD_RISK_SCALE
        value: "0.35"
      - key: CHOP_GUARD_NOTIONAL_SCALE
        value: "0.60"
      - key: CHOP_GUARD_BLOCK_MINUTES
        value: "60"
      - key: SELECTIVE_PROMOTION_MIN_AUC
        value: "0.48"
      - key: SELECTIVE_PROMOTION_MIN_PRECISION
        value: "0.60"
      - key: SELECTIVE_PROMOTION_MAX_DRAWDOWN
        value: "0.10"
      - key: PROMOTION_MIN_BUY_SUPPORT
        value: "15"

  - type: keyvalue
    name: xgboost-copy-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
